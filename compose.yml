services:
  postgres:
    image: postgres:17-alpine
    container_name: image-service-db
    environment:
      POSTGRES_USER: imageuser
      POSTGRES_PASSWORD: imagepass123
      POSTGRES_DB: image_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - image-service-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imageuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: image-service-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - image-service-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: image-service-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - image-service-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local

networks:
  image-service-network:
    driver: bridge