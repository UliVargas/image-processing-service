schema: spec-driven

context: |
  Tech stack: Go 1.25+, chi/v5, GORM, PostgreSQL, SQLite (tests), MinIO/AWS S3, JWT, Atlas migrations
  Architecture: Clean Architecture adaptada — módulos (auth, user, session, file) con capas handler→service→repository, interfaces para desacoplar transporte de lógica
  Testing: go test + testify; mocks manuales para unit (service), SQLite in-memory para repositorios
  Style: gofmt, go vet, lefthook (lint commit messages con lint_commit.go)
  Naming: español en mensajes de error y comments; inglés en símbolos de código

strict_tdd: true

testing:
  test_runner:
    command: "go test ./... -cover"
    framework: "go test + testify"
  layers:
    unit:
      available: true
      tool: "go test + testify mocks manuales"
    integration:
      available: true
      tool: "go test + SQLite in-memory (gorm/driver/sqlite)"
    e2e:
      available: false
      tool: null
  coverage:
    available: true
    command: "go test ./... -cover"
  quality_tools:
    linter:
      available: false
      command: null
      note: "Solo lint de commits via lefthook. Considerar golangci-lint."
    type_checker:
      available: true
      command: "go vet ./..."
    formatter:
      available: true
      command: "gofmt -l ."

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
    - Note if change requires DB migration
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
    - Error codes follow pattern MODULE_ERROR_TYPE in SCREAMING_SNAKE_CASE
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
    - Interfaces go in the same package as consumers
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing patterns: handler→service→repository via interfaces
    - Errors are *AppError via utils.NewError(status, code, message, details)
    - IDs generated with utils.GenerateID() (cuid2)
    - Response helpers: utils.Success / utils.HandleError
    - Tests: GIVEN/WHEN/THEN comments, mock structs with Fn fields
  verify:
    - Run go test ./... -cover after every change
    - Run go vet ./... for type correctness
    - Compare implementation against every spec scenario
  archive:
    - Warn before merging destructive deltas (large removals)
